name: CD Deploy (zip)

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to package and deploy'
        required: false
        default: 'main'

jobs:
  deploy-zip:
    runs-on: ubuntu-latest
    env:
      SSH_USER: ${{ secrets.SSH_USER || vars.SSH_USER }}
      SSH_HOST: ${{ secrets.SSH_HOST || vars.SSH_HOST }}
      SSH_PORT: ${{ secrets.SSH_PORT || vars.SSH_PORT }}
      DEPLOY_PATH: ${{ secrets.DEPLOY_PATH || vars.DEPLOY_PATH || '/home/ubuntu/application' }}
      SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY || secrets.SSH_KEY || secrets.GH_SECRET_KEY || vars.SSH_PRIVATE_KEY || vars.SSH_KEY || vars.GH_SECRET_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create archive (git archive)
        run: |
          BRANCH="${{ github.event.inputs.branch || github.ref_name }}"
          echo "Packaging branch: $BRANCH"
          # Try to fetch the branch from origin so we can archive a clean, committed tree
          git fetch origin "$BRANCH" --depth=1 || true
          # Prefer archiving the remote ref if available to avoid local changes
          git archive --format=tar.gz -o deploy.tar.gz "origin/${BRANCH}" || git archive --format=tar.gz -o deploy.tar.gz "${BRANCH}"

      - name: Verify archive exists
        run: |
          if [ -f deploy.tar.gz ]; then
            echo "deploy.tar.gz created";
            ls -lh deploy.tar.gz;
          else
            echo "deploy.tar.gz missing:";
            ls -la || true;
            exit 1;
          fi

      - name: Configure SSH private key
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ env.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          printf '%s\n' 'Host *' '  StrictHostKeyChecking no' '  UserKnownHostsFile /dev/null' > ~/.ssh/config

      - name: Validate SSH private key
        run: |
          if [ ! -s ~/.ssh/id_rsa ]; then
            echo "ERROR: SSH_PRIVATE_KEY is empty or missing."
            exit 1
          fi
          echo "SSH private key file written: $(stat -c%s ~/.ssh/id_rsa) bytes"

      - name: Debug SSH variables
        run: |
          echo "SSH_USER env=${SSH_USER}"
          echo "SSH_HOST env=${SSH_HOST}"
          echo "SSH_PORT env=${SSH_PORT}"
          echo "DEPLOY_PATH env=${DEPLOY_PATH}"
          echo "SSH_USER expr=${{ secrets.SSH_USER || vars.SSH_USER }}"
          echo "SSH_HOST expr=${{ secrets.SSH_HOST || vars.SSH_HOST }}"
          echo "SSH_PORT expr=${{ secrets.SSH_PORT || vars.SSH_PORT }}"
          echo "DEPLOY_PATH expr=${{ secrets.DEPLOY_PATH || vars.DEPLOY_PATH || '/home/ubuntu/application' }}"

      - name: Add remote host to known_hosts (optional)
        run: |
          if [ -z "${SSH_HOST}" ]; then
            echo "SSH_HOST not set — skipping ssh-keyscan (will use SSH options to skip host checks)"
          else
            if [ -z "${SSH_PORT}" ]; then
              ssh-keyscan -H ${SSH_HOST} >> ~/.ssh/known_hosts || true
            else
              ssh-keyscan -p ${SSH_PORT} -H ${SSH_HOST} >> ~/.ssh/known_hosts || true
            fi
          fi

      - name: Ensure deploy directory exists on server
        run: |
          PORT_FLAG=""
          if [ -n "${SSH_PORT:-}" ]; then PORT_FLAG="-p ${SSH_PORT}"; fi
          DEPLOY_PATH="${DEPLOY_PATH:-/home/ubuntu/application}"
          ssh -o IdentitiesOnly=yes -i ~/.ssh/id_rsa $PORT_FLAG ${SSH_USER}@${SSH_HOST} "mkdir -p '${DEPLOY_PATH}' && chown -R ${SSH_USER}:${SSH_USER} '${DEPLOY_PATH}' || true"

      - name: Copy archive to server
        run: |
          PORT_FLAG=""
          if [ -n "${SSH_PORT:-}" ]; then PORT_FLAG="-P ${SSH_PORT}"; fi
          DEPLOY_PATH="${DEPLOY_PATH:-/home/ubuntu/application}"
          scp -o IdentitiesOnly=yes -i ~/.ssh/id_rsa $PORT_FLAG deploy.tar.gz ${SSH_USER}@${SSH_HOST}:${DEPLOY_PATH}/deploy.tar.gz

      - name: Extract, install, and start on server
        run: |
          set -euo pipefail
          PORT_FLAG=""
          if [ -n "${SSH_PORT:-}" ]; then PORT_FLAG="-p ${SSH_PORT}"; fi
          DEPLOY_PATH="${DEPLOY_PATH:-/home/ubuntu/application}"
          ssh -o IdentitiesOnly=yes -i ~/.ssh/id_rsa $PORT_FLAG ${SSH_USER}@${SSH_HOST} << 'EOF'
            set -e
            cd "${DEPLOY_PATH}"
            # Extract into deploy path (overwrite files)
            tar -xzf deploy.tar.gz -C "${DEPLOY_PATH}"
            rm -f deploy.tar.gz
            # Install dependencies
            npm install --production
            # Start the app using nohup
            nohup npm start > app.log 2>&1 &
          EOF

      - name: Cleanup archive locally
        if: always()
        run: |
          rm -f deploy.tar.gz
